<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#111210;
    --bg2:#191917;
    --bg3:#222220;
    --bg4:#2a2a28;
    --border:#2e2e2c;
    --border2:#3a3a38;
    --text:#e8e6e1;
    --text2:#9e9c97;
    --text3:#6a6864;
    --accent:#f4792a;
    --accent2:#d45e14;
    --accent-dim:rgba(244,121,42,0.12);
    --accent-dim2:rgba(244,121,42,0.2);
    --high:#e85555;
    --high-bg:rgba(232,85,85,0.1);
    --med:#f4b842;
    --med-bg:rgba(244,184,66,0.1);
    --low:#4caf7d;
    --low-bg:rgba(76,175,125,0.1);
    --font:'DM Sans',sans-serif;
    --mono:'DM Mono',monospace;
    --r:8px;
    --r2:12px;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  button{font-family:var(--font);cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:var(--font)}

  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
  .logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;letter-spacing:-0.3px}
  .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .header-right{display:flex;align-items:center;gap:8px}
  .view-toggle{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;border:1px solid var(--border)}
  .view-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text2);transition:all 0.15s;display:flex;align-items:center;gap:5px}
  .view-btn.active{background:var(--accent);color:#fff}
  .view-btn:hover:not(.active){color:var(--text);background:var(--bg4)}
  .add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--accent);color:#fff;border-radius:var(--r);font-size:13px;font-weight:500;transition:background 0.15s}
  .add-btn:hover{background:var(--accent2)}

  /* FILTERS */
  .filters{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto}
  .filter-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all 0.15s}
  .filter-chip:hover{border-color:var(--accent);color:var(--accent)}
  .filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .filter-chip i{font-size:13px}
  .search-wrap{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);margin-right:4px}
  .search-wrap i{font-size:13px}
  .search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:120px}
  .search-wrap input::placeholder{color:var(--text3)}

  /* MAIN */
  .main{flex:1;overflow:hidden;display:flex;flex-direction:column}

  /* LIST VIEW */
  .list-view{flex:1;overflow-y:auto;padding:16px 20px}
  .list-view::-webkit-scrollbar{width:4px}
  .list-view::-webkit-scrollbar-track{background:transparent}
  .list-view::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .section-header{display:flex;align-items:center;gap:8px;margin:0 0 8px;padding:4px 0}
  .section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3)}
  .section-count{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .section-line{flex:1;height:1px;background:var(--border)}
  .task-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
  .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
  .task-card.pri-high::before{background:var(--high)}
  .task-card.pri-med::before{background:var(--med)}
  .task-card.pri-low::before{background:var(--low)}
  .task-card:hover{border-color:var(--border2);background:var(--bg3)}
  .task-card.done-card{opacity:0.55}
  .check-btn{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s;cursor:pointer;background:none}
  .check-btn:hover{border-color:var(--accent)}
  .check-btn.checked{background:var(--low);border-color:var(--low)}
  .check-btn.checked i{color:#fff;font-size:11px}
  .check-btn i{font-size:11px;color:transparent}
  .task-main{flex:1;min-width:0}
  .task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task-title.done-text{text-decoration:line-through;color:var(--text3)}
  .task-desc{font-size:12px;color:var(--text2);margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
  .badge-pri.high{background:var(--high-bg);color:var(--high)}
  .badge-pri.med{background:var(--med-bg);color:var(--med)}
  .badge-pri.low{background:var(--low-bg);color:var(--low)}
  .badge-tag{background:var(--accent-dim);color:var(--accent);font-size:10px;padding:2px 6px;border-radius:4px;display:inline-flex}
  .badge-date{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
  .badge-date i{font-size:11px}
  .badge-date.overdue{color:var(--high)}
  .badge-assign{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
  .avatar-sm{width:18px;height:18px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:8px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .task-actions{display:flex;gap:4px;flex-shrink:0}
  .icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text3);transition:all 0.15s;cursor:pointer;background:none;border:none}
  .icon-btn:hover{color:var(--text);background:var(--bg4)}
  .icon-btn.active-prog{color:var(--med);background:var(--med-bg)}
  .icon-btn.active-prog:hover{color:var(--med);background:var(--med-bg)}

  /* CALENDAR VIEW */
  .cal-view{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-month{font-size:16px;font-weight:600}
  .cal-nav-btns{display:flex;gap:4px}
  .cal-nav-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center}
  .cal-nav-btn:hover{color:var(--text);border-color:var(--border2)}
  .cal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
  .cal-day-label{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
  .cal-cell{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:6px;min-height:90px;cursor:pointer;transition:all 0.15s;overflow:hidden}
  .cal-cell:hover{border-color:var(--border2);background:var(--bg3)}
  .cal-cell.other-month{opacity:0.3}
  .cal-cell.today{border-color:var(--accent);background:var(--accent-dim)}
  .cal-cell.today .cal-date-num{background:var(--accent);color:#fff}
  .cal-date-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px}
  .cal-task-pill{padding:2px 5px;border-radius:3px;font-size:10px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .cal-task-pill.high{background:var(--high-bg);color:var(--high)}
  .cal-task-pill.med{background:var(--med-bg);color:var(--med)}
  .cal-task-pill.low{background:var(--low-bg);color:var(--low)}
  .cal-more{font-size:10px;color:var(--text3);padding:1px 4px}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
  .modal::-webkit-scrollbar{width:4px}
  .modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0;flex-shrink:0}
  .modal-title{font-size:15px;font-weight:600}
  .modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 18px;flex-shrink:0}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
  .field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.15s;font-family:var(--font)}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field select option{background:var(--bg3)}
  .field textarea{resize:vertical;min-height:72px;line-height:1.5}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn-primary{padding:8px 18px;background:var(--accent);color:#fff;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background 0.15s}
  .btn-primary:hover{background:var(--accent2)}
  .btn-secondary{padding:8px 16px;background:transparent;color:var(--text2);border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid var(--border2);transition:all 0.15s}
  .btn-secondary:hover{color:var(--text);border-color:var(--border2);background:var(--bg3)}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:8px;text-align:center}
  .empty i{font-size:32px;color:var(--border2)}
  .empty p{font-size:13px}

  .gsheets-banner{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--accent-dim);border-bottom:1px solid rgba(244,121,42,0.2);font-size:12px;color:var(--accent);flex-shrink:0}
  .gsheets-banner i{font-size:14px;flex-shrink:0}
  .gsheets-banner code{font-family:var(--mono);font-size:11px;background:rgba(244,121,42,0.15);padding:1px 5px;border-radius:3px}
  .close-banner{margin-left:auto;color:var(--accent);opacity:0.6;cursor:pointer;font-size:16px;display:flex;align-items:center}
  .close-banner:hover{opacity:1}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="gsheets-banner" id="banner">
    <i class="ti ti-table" aria-hidden="true"></i>
    <span>Google Sheets sync is active — all tasks are saved automatically to your connected spreadsheet.</span>
    <button class="close-banner" onclick="document.getElementById('banner').remove()" aria-label="Dismiss"><i class="ti ti-x"></i></button>
  </div>

  <header class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      TaskFlow
    </div>
    <div class="header-right">
      <button class="icon-btn" id="notifBtn" onclick="showNotifPanel()" aria-label="Notifications" style="position:relative;color:var(--text2)">
        <i class="ti ti-bell" aria-hidden="true"></i>
        <span id="notifBadge" style="display:none;position:absolute;top:4px;right:4px;width:16px;height:16px;background:var(--accent);color:#fff;border-radius:50%;font-size:9px;font-weight:600;align-items:center;justify-content:center;line-height:1"></span>
      </button>
      <div class="view-toggle">
        <button class="view-btn active" id="listBtn" onclick="setView('list')" aria-label="List view"><i class="ti ti-list"></i> List</button>
        <button class="view-btn" id="calBtn" onclick="setView('cal')" aria-label="Calendar view"><i class="ti ti-calendar"></i> Calendar</button>
      </div>
      <button class="add-btn" onclick="openModal()" aria-label="Add task">
        <i class="ti ti-plus"></i> New task
      </button>
    </div>
  </header>

  <div class="filters">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" placeholder="Search tasks…" id="searchInput" oninput="renderCurrent()">
    </div>
    <button class="filter-chip active" data-filter="all" onclick="setFilter(this,'all')"><i class="ti ti-layout-grid"></i> All</button>
    <button class="filter-chip" data-filter="todo" onclick="setFilter(this,'todo')"><i class="ti ti-circle"></i> To Do</button>
    <button class="filter-chip" data-filter="inprogress" onclick="setFilter(this,'inprogress')"><i class="ti ti-loader"></i> In Progress</button>
    <button class="filter-chip" data-filter="done" onclick="setFilter(this,'done')"><i class="ti ti-circle-check"></i> Done</button>
    <button class="filter-chip" data-filter="high" onclick="setFilter(this,'high')"><i class="ti ti-flame"></i> High</button>
    <button class="filter-chip" data-filter="overdue" onclick="setFilter(this,'overdue')"><i class="ti ti-alert-circle"></i> Overdue</button>
  </div>

  <div class="main" id="mainArea"></div>

  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">New task</span>
        <button class="icon-btn" onclick="closeModal()" aria-label="Close"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Title *</label>
          <input type="text" id="fTitle" placeholder="What needs to be done?">
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="fDesc" placeholder="Add details…"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Priority</label>
            <select id="fPriority">
              <option value="med">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="fStatus">
              <option value="todo">To Do</option>
              <option value="inprogress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Due date</label>
            <input type="date" id="fDue">
          </div>
          <div class="field">
            <label>Assigned to</label>
            <input type="text" id="fAssign" placeholder="Name or email">
          </div>
        </div>
        <div class="field">
          <label>Category / tags</label>
          <input type="text" id="fTags" placeholder="e.g. Design, Backend (comma-separated)">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTask()">Save task</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVz8CruARbiE0QqVtLPs2qNyr1Y9ZmVmyvKpJzYjALB2gQhGeR8OADtBcb_QRyJoM/exec';
// ────────────────────────────────────────────────────────────

let tasks = JSON.parse(localStorage.getItem('tf_tasks')||'[]');
let editId = null;
let currentView = 'list';
let currentFilter = 'all';
let calYear, calMonth;

const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

// Only insert sample data on very first ever load
if(!localStorage.getItem('tf_initialised')){
  localStorage.setItem('tf_initialised','1');
  if(!tasks.length){
    tasks = [
      {id:'1',title:'Design system setup',desc:'Create base tokens, colors, typography scale for the new brand refresh.',priority:'high',status:'inprogress',due: getDateStr(5),assigned:'Alex M.',tags:['Design']},
      {id:'2',title:'API endpoint documentation',desc:'Document all REST endpoints with request/response examples.',priority:'med',status:'todo',due: getDateStr(10),assigned:'Jordan K.',tags:['Backend','Docs']},
      {id:'3',title:'Write Q2 retrospective',desc:'Cover what went well, blockers, and improvements for next quarter.',priority:'low',status:'done',due: getDateStr(-6),assigned:'Sam P.',tags:['Management']},
      {id:'4',title:'Fix auth token expiry bug',desc:'Users are being logged out early — trace the JWT refresh logic.',priority:'high',status:'todo',due: getDateStr(2),assigned:'Alex M.',tags:['Backend']},
      {id:'5',title:'Update onboarding flow',desc:'Revise copy and add new screens per the UX audit findings.',priority:'med',status:'todo',due: getDateStr(20),assigned:'Jordan K.',tags:['Design','Frontend']},
    ];
    persist();
  }
}

// Load from Sheets on startup — only overwrite local if Sheet has data
if(SCRIPT_URL){
  fetch(SCRIPT_URL+'?action=getAll')
    .then(r=>r.text())
    .then(text=>{ 
      try {
        const data=JSON.parse(text);
        if(data.ok && data.tasks && data.tasks.length){
          tasks=data.tasks;
          localStorage.setItem('tf_tasks',JSON.stringify(tasks));
          renderCurrent();
        }
      } catch(e){}
    })
    .catch(()=>{});
}

// Poll for new email-ingested tasks every 60 seconds
function pollNotifications(){
  if(!SCRIPT_URL) return;
  fetch(SCRIPT_URL+'?action=getNotifications')
    .then(r=>r.text())
    .then(text=>{
      try{
        const data=JSON.parse(text);
        if(data.ok && data.notifications && data.notifications.length){
          const unread=data.notifications.filter(n=>n.status==='unread');
          updateNotifBadge(unread);
          if(unread.length){
            // Reload tasks so new email tasks appear
            fetch(SCRIPT_URL+'?action=getAll')
              .then(r=>r.text())
              .then(t2=>{
                try{
                  const d2=JSON.parse(t2);
                  if(d2.ok && d2.tasks && d2.tasks.length){tasks=d2.tasks;persist();renderCurrent();}
                }catch(e){}
              }).catch(()=>{});
          }
        }
      }catch(e){}
    }).catch(()=>{});
}

function updateNotifBadge(unread){
  let badge=document.getElementById('notifBadge');
  if(!badge) return;
  if(unread.length>0){
    badge.textContent=unread.length;
    badge.style.display='flex';
    document.getElementById('notifBtn').style.color='var(--accent)';
  } else {
    badge.style.display='none';
    document.getElementById('notifBtn').style.color='var(--text2)';
  }
}

function clearAllNotifs(){
  const panel=document.getElementById('notifPanel');
  if(panel) panel.remove();
  updateNotifBadge([]);
  if(SCRIPT_URL){
    fetch(SCRIPT_URL+'?action=clearNotifs')
      .then(r=>r.text())
      .catch(()=>{});
  }
}

function showNotifPanel(){
  if(!SCRIPT_URL) return;
  fetch(SCRIPT_URL+'?action=getNotifications')
    .then(r=>r.text())
    .then(text=>{
      try{
        const data=JSON.parse(text);
        const notifs=data.notifications||[];
        renderNotifPanel(notifs);
        // Mark all read
        fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'markNotifsRead'}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
        updateNotifBadge([]);
      }catch(e){}
    }).catch(()=>{});
}

function renderNotifPanel(notifs){
  const existing=document.getElementById('notifPanel');
  if(existing){existing.remove();return;}
  const panel=document.createElement('div');
  panel.id='notifPanel';
  panel.style.cssText='position:fixed;top:60px;right:16px;width:300px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);z-index:999;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.4)';
  const unread=notifs.filter(n=>n.status==='unread');
  const items=notifs.slice(0,10);
  panel.innerHTML=`
    <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;font-weight:600">Notifications</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${unread.length?`<span style="font-size:11px;color:var(--accent)">${unread.length} new</span>`:''}
        ${notifs.length?`<button onclick="clearAllNotifs()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:var(--font)" onmouseover="this.style.color='var(--high)'" onmouseout="this.style.color='var(--text3)'">Clear all</button>`:''}
      </div>
    </div>
    ${items.length?items.map(n=>`
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;${n.status==='unread'?'background:var(--accent-dim)':''}" onclick="openModal('${n.taskId}');document.getElementById('notifPanel').remove()">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <i class="ti ti-mail" style="font-size:12px;color:var(--accent)" aria-hidden="true"></i>
          <span style="font-size:11px;color:var(--accent);font-weight:500">From email</span>
        </div>
        <div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n.title)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${new Date(n.timestamp).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
      </div>`).join(''):`<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">No notifications yet</div>`}
  `;
  document.body.appendChild(panel);
  setTimeout(()=>document.addEventListener('click',function h(e){if(!panel.contains(e.target)&&e.target.id!=='notifBtn'){panel.remove();document.removeEventListener('click',h);}},),10);
}

setInterval(pollNotifications, 60000);
setTimeout(pollNotifications, 3000);

function getDateStr(offsetDays){
  const d=new Date(); d.setDate(d.getDate()+offsetDays);
  return d.toISOString().slice(0,10);
}

function persist(){
  localStorage.setItem('tf_tasks',JSON.stringify(tasks));
  if(SCRIPT_URL){
    // Use text/plain + no-cors to bypass CORS preflight for Apps Script
    fetch(SCRIPT_URL,{
      method:'POST',
      mode:'no-cors',
      body:JSON.stringify({action:'sync',tasks}),
      headers:{'Content-Type':'text/plain'}
    }).catch(()=>{});
  }
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

function setView(v){
  currentView=v;
  document.getElementById('listBtn').className='view-btn'+(v==='list'?' active':'');
  document.getElementById('calBtn').className='view-btn'+(v==='cal'?' active':'');
  renderCurrent();
}

function setFilter(el,f){
  currentFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderCurrent();
}

function renderCurrent(){
  if(currentView==='list') renderList();
  else renderCal();
}

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const today=new Date(); today.setHours(0,0,0,0);
  return tasks.filter(t=>{
    if(q&&!t.title.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q)&&!(t.tags||[]).join(' ').toLowerCase().includes(q)) return false;
    if(currentFilter==='all') return true;
    if(currentFilter==='todo') return t.status==='todo';
    if(currentFilter==='inprogress') return t.status==='inprogress';
    if(currentFilter==='done') return t.status==='done';
    if(currentFilter==='high') return t.priority==='high';
    if(currentFilter==='overdue'){
      if(!t.due||t.status==='done') return false;
      return new Date(t.due+'T00:00:00')<today;
    }
    return true;
  });
}

function renderList(){
  const area=document.getElementById('mainArea');
  const filtered=getFiltered();
  const order={'inprogress':0,'todo':1,'done':2};
  const sorted=[...filtered].sort((a,b)=>{
    if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
    const po={'high':0,'med':1,'low':2};
    return po[a.priority]-po[b.priority];
  });

  const sections=[
    {key:'inprogress',label:'In Progress',tasks:sorted.filter(t=>t.status==='inprogress')},
    {key:'todo',label:'To Do',tasks:sorted.filter(t=>t.status==='todo')},
    {key:'done',label:'Done',tasks:sorted.filter(t=>t.status==='done')},
  ].filter(s=>s.tasks.length);

  if(!sorted.length){
    area.innerHTML=`<div class="list-view"><div class="empty"><i class="ti ti-checkbox"></i><p>No tasks match this filter.</p></div></div>`;
    return;
  }

  area.innerHTML=`<div class="list-view">${sections.map(s=>`
    <div class="section-header">
      <span class="section-title">${s.label}</span>
      <span class="section-count">${s.tasks.length}</span>
      <div class="section-line"></div>
    </div>
    ${s.tasks.map(taskCard).join('')}
  `).join('')}</div>`;
}

function priorityLabel(p){return{high:'High',med:'Medium',low:'Low'}[p]||p}
function statusLabel(s){return{todo:'To Do',inprogress:'In Progress',done:'Done'}[s]||s}

function isOverdue(t){
  if(!t.due||t.status==='done') return false;
  const today=new Date(); today.setHours(0,0,0,0);
  return new Date(t.due+'T00:00:00')<today;
}

function fmtDate(d){
  if(!d) return '';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

function initials(name){
  if(!name) return '?';
  return name.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

function taskCard(t){
  const od=isOverdue(t);
  const tags=(t.tags||[]).map(tg=>`<span class="badge badge-tag">#${tg}</span>`).join('');
  const done=t.status==='done';
  return `<div class="task-card pri-${t.priority}${done?' done-card':''}" onclick="openModal('${t.id}')">
    <button class="check-btn${done?' checked':''}" onclick="event.stopPropagation();toggleDone('${t.id}')" aria-label="${done?'Unmark':'Mark as done'}">
      <i class="ti ti-check" aria-hidden="true"></i>
    </button>
    <div class="task-main">
      <div class="task-title${done?' done-text':''}">${esc(t.title)}</div>
      ${t.desc?`<div class="task-desc">${esc(t.desc)}</div>`:''}
      <div class="task-meta">
        <span class="badge badge-pri ${t.priority}">${priorityLabel(t.priority)}</span>
        ${t.due?`<span class="badge-date${od?' overdue':''}"><i class="ti ti-calendar-event" aria-hidden="true"></i>${fmtDate(t.due)}${od?' · Overdue':''}</span>`:''}
        ${t.assigned?`<span class="badge-assign"><span class="avatar-sm">${initials(t.assigned)}</span>${esc(t.assigned)}</span>`:''}
        ${tags}
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn${t.status==='inprogress'?' active-prog':''}" onclick="event.stopPropagation();toggleInProgress('${t.id}')" aria-label="Toggle in progress" title="Mark in progress"><i class="ti ti-player-play" aria-hidden="true"></i></button>
      <button class="icon-btn del" onclick="event.stopPropagation();deleteTask('${t.id}')" aria-label="Delete task"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>
  </div>`;
}

function renderCal(){
  const area=document.getElementById('mainArea');
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const today=new Date();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const byDate={};
  tasks.forEach(t=>{
    if(t.due) (byDate[t.due]=byDate[t.due]||[]).push(t);
  });

  const dayLabels=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const cells=[];
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,curMonth:false,date:null});
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({day:d,curMonth:true,date:dateStr,isToday:d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear()});
  }
  const rem=cells.length%7;
  if(rem) for(let d=1;d<=7-rem;d++) cells.push({day:d,curMonth:false,date:null});

  area.innerHTML=`<div class="cal-view">
    <div class="cal-nav">
      <span class="cal-month">${monthNames[calMonth]} ${calYear}</span>
      <div class="cal-nav-btns">
        <button class="cal-nav-btn" onclick="shiftMonth(-1)" aria-label="Previous month"><i class="ti ti-chevron-left"></i></button>
        <button class="cal-nav-btn" onclick="shiftMonth(1)" aria-label="Next month"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="cal-grid-head">${dayLabels.map(d=>`<div class="cal-day-label">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells.map(c=>{
      const cellTasks=c.date?(byDate[c.date]||[]):[];
      const pills=cellTasks.slice(0,3).map(t=>`<div class="cal-task-pill ${t.priority}" title="${esc(t.title)}" onclick="event.stopPropagation();openModal('${t.id}')">${esc(t.title)}</div>`).join('');
      const more=cellTasks.length>3?`<div class="cal-more">+${cellTasks.length-3} more</div>`:'';
      return `<div class="cal-cell${!c.curMonth?' other-month':''}${c.isToday?' today':''}" onclick="${c.date?`openModalWithDate('${c.date}')`:''}">${c.curMonth?`<span class="cal-date-num">${c.day}</span>${pills}${more}`:`<span class="cal-date-num">${c.day}</span>`}</div>`;
    }).join('')}</div>
  </div>`;
}

function shiftMonth(d){
  calMonth+=d;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCal();
}

function openModal(id){
  editId=id||null;
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('modalTitle').textContent=t?'Edit task':'New task';
  document.getElementById('fTitle').value=t?t.title:'';
  document.getElementById('fDesc').value=t?t.desc:'';
  document.getElementById('fPriority').value=t?t.priority:'med';
  document.getElementById('fStatus').value=t?t.status:'todo';
  document.getElementById('fDue').value=t?t.due:'';
  document.getElementById('fAssign').value=t?t.assigned:'';
  document.getElementById('fTags').value=t?(t.tags||[]).join(', '):'';
  document.getElementById('modalOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('fTitle').focus(),50);
}

function openModalWithDate(date){
  openModal();
  document.getElementById('fDue').value=date;
}

function closeModal(){
  document.getElementById('modalOverlay').style.display='none';
  editId=null;
}

function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){document.getElementById('fTitle').focus();return;}
  const task={
    id:editId||uid(),
    title,
    desc:document.getElementById('fDesc').value.trim(),
    priority:document.getElementById('fPriority').value,
    status:document.getElementById('fStatus').value,
    due:document.getElementById('fDue').value,
    assigned:document.getElementById('fAssign').value.trim(),
    tags:document.getElementById('fTags').value.split(',').map(s=>s.trim()).filter(Boolean),
  };
  if(editId){
    const i=tasks.findIndex(t=>t.id===editId);
    if(i>-1) tasks[i]=task;
  } else {
    tasks.unshift(task);
  }
  persist();
  closeModal();
  renderCurrent();
}

function toggleInProgress(id){
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  t.status=t.status==='inprogress'?'todo':'inprogress';
  persist();
  renderCurrent();
}

function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  t.status=t.status==='done'?'todo':'done';
  persist();
  renderCurrent();
}

function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id);
  persist();
  renderCurrent();
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderList();
</script>
</body>
</html>
